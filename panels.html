<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>A330 - Access Panels</title>
    <style>
        /* TEMEL STİLLER (theme.css yerine) */
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --accent: #3498db;
            --border: #333;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-link { color: var(--accent); text-decoration: none; font-size: 15px; }

        .search-input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); margin-bottom: 20px; font-size: 16px;
        }

        details { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
        summary { padding: 15px; cursor: pointer; font-weight: 600; }
        .cb-box { padding: 15px; border-top: 1px solid var(--border); font-size: 14px; line-height: 1.6; }
        
        .btn {
            background: var(--accent); color: white; border: none; padding: 12px;
            width: 100%; border-radius: 8px; font-weight: 600; margin-top: 10px;
        }

        /* 🚀 SAFARI GÖRSEL HATASINI ÇÖZEN MODAL KODU */
        .modal {
            display: none; /* JS ile 'flex' yapılacak */
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            /* İçeriği her zaman ortalar */
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #modalImg {
            /* Safari'de devasa olmasını engelleyen kısımlar */
            max-width: 100% !important;
            max-height: 100% !important;
            object-fit: contain !important; /* Resmin oranını korur, ekrana sığdırır */
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            /* Donanım ivmelendirmesi (Safari titremesini önler) */
            -webkit-transform: translateZ(0);
        }

        .modal-close {
            position: absolute;
            top: calc(env(safe-area-inset-top) + 20px);
            right: 20px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 10001;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="back-link">← Ana Sayfa</a>
        <h2>Access Panels</h2>
    </div>

    <input type="text" id="search" class="search-input" placeholder="Panel ara..." onkeyup="filter()">

    <div id="list">
        <details class="item">
            <summary>Engine #1 Pylon</summary>
            <div class="cb-box">
                Panels: 451AL, 451BL, 451BR...
                <button class="btn" onclick="openImg('62')">Görseli Aç</button>
            </div>
        </details>
        </div>
</div>

<div id="imgModal" class="modal" onclick="closeImg()">
    <span class="modal-close" onclick="closeImg()">&times;</span>
    <img id="modalImg" src="" alt="Yükleniyor...">
</div>

<script>
    function openImg(n) {
        const modal = document.getElementById('imgModal');
        const img = document.getElementById('modalImg');
        
        // Resim yolunu ayarla
        img.src = 'images/' + n + '.png';
        
        // Safari'de düzgün merkezleme için FLEX kullanıyoruz
        modal.style.display = 'flex';
        
        // Sayfanın arkada kaymasını durdur
        document.body.style.overflow = 'hidden';
    }

    function closeImg() {
        document.getElementById('imgModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function filter() {
        let q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(q) ? '' : 'none';
        });
    }
</script>

</body>
</html>
