<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A330 - Circuit Breakers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <style>
        details {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; margin-bottom: 8px; overflow: hidden;
        }
        details[open] { border-color: var(--accent); }
        summary {
            padding: 14px 16px; font-weight: 600; font-size: 13px;
            cursor: pointer; color: var(--text); list-style: none;
            display: flex; align-items: center; justify-content: space-between;
        }
        summary::after { content: '›'; color: var(--text-muted); font-size: 18px; }
        details[open] summary::after { transform: rotate(90deg); display: inline-block; }
        .cb-box { padding: 12px 16px 16px; font-size: 13px; color: var(--text); line-height: 1.7; border-top: 1px solid var(--border); }
        .location-tag {
            display: block; margin-top: 10px; padding: 8px 12px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--danger); font-weight: 600; font-size: 12px;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="page-header">
        <a href="index.html" class="back-link">← Ana Menü</a>
        <span class="page-title">Circuit Breakers</span>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>

    <input type="text" id="search" class="search-input" onkeyup="renderList()" placeholder="FIN, Tanım veya Panel ara..." autocomplete="off">

    <div class="btn-group" style="margin-bottom:16px;">
        <button class="btn" onclick="openAllPanels()">🗺️ Tüm Panel Konumları (10 Görsel)</button>
    </div>

    <p id="counter" class="info-text">En az 2 karakter yazın.</p>
    <div id="cb-list-container"></div>
</div>

<div id="imgModal" class="modal"  onclick="closeImg()">
    <span class="modal-close" onclick="closeImg()" style="position:fixed;">&times;</span>
    <div id="modalWrapper" style="display:flex;flex-direction:column;align-items:center;gap:24px;width:100%;padding:70px 20px 40px;" onclick="event.stopPropagation()"></div>
</div>

<div class="offline-bar" id="offlineBar">📡 Çevrimdışı mod</div>

<script src="data.js"></script>
<script>
const allPanelImages = ['all1','all2','all3','all4','all5','all6','all7','all8','all9','all10'];

function renderList() {
    const q = document.getElementById('search').value.toLowerCase();
    const container = document.getElementById('cb-list-container');
    const counter = document.getElementById('counter');
    container.innerHTML = '';
    if (q.length < 2) { counter.innerText = 'En az 2 karakter yazın.'; return; }

    const filtered = cbData.filter(item =>
        item.fin.toLowerCase().includes(q) ||
        item.desc.toLowerCase().includes(q) ||
        item.panel.toLowerCase().includes(q)
    );

    counter.innerText = filtered.length + ' sonuç listelendi.';
    filtered.forEach(item => {
        container.insertAdjacentHTML('beforeend', `
        <details>
            <summary>${item.fin} — ${item.desc}</summary>
            <div class="cb-box">
                <b>FIN:</b> ${item.fin}<br>
                <b>Tanım:</b> ${item.desc}<br>
                <span class="location-tag">📍 Panel: ${item.panel} | Konum: ${item.loc}</span>
                <button class="btn" style="margin-top:12px;width:100%;" onclick="openSingleImg('${item.panel}')">🖼️ ${item.panel} Şemasını Gör</button>
            </div>
        </details>`);
    });
}

function openSingleImg(panel) {
    showModal([panel.toLowerCase().replace(/\s+/g,'') + '.png']);
}

function openAllPanels() {
    showModal(allPanelImages.map(f => f + '.png'));
}

function showModal(files) {
    const wrapper = document.getElementById('modalWrapper');
    wrapper.innerHTML = files.map(f =>
        `<img src="cbs/${f}" style="max-width:90%;border-radius:10px;">`
    ).join('');
    document.getElementById('imgModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeImg() {
    document.getElementById('imgModal').style.display = 'none';
    document.body.style.overflow = 'auto';
}

window.onload = function() {
    const q = new URLSearchParams(window.location.search).get('search');
    if (q) {
        setTimeout(() => {
            const el = document.getElementById('search');
            el.value = q;
            renderList();
        }, 200);
    }
};
</script>
<script src="theme.js"></script>
</body>
</html>
